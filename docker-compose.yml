version: "3.8"

services:
  tamilrockerstorrentcleanup:
    build: .
    container_name: tamilrockerstorrentcleanup
    restart: no
    environment:
      DATABASE_URL: ${DATABASE_URL}
      QBITIP: ${QBITIP}
      QBITUSER: ${QBITUSER}
      QBITPASS: ${QBITPASS}
      HA_WEBHOOK_URL: ${HA_WEBHOOK_URL} 
      HA_WEBHOOKError_URL: ${HA_WEBHOOKError_URL}
      #webhook url for triggering next app after finishing this tasks
    dns:
      - 1.1.1.1
      - 1.0.0.1






